name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy deliverables into build output
        run: |
          mkdir -p docs/deliverables
          cp -r deliverables/* docs/deliverables/

      - name: Add .nojekyll (so /assets/_files load correctly)
        run: touch docs/.nojekyll

      - name: Commit built docs/ back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: deploy [skip ci]"
            git push
          fi
