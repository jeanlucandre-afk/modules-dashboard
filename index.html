<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modules // Mango Lab · SS26</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23FC5816%22/><text x=%2250%22 y=%2272%22 text-anchor=%22middle%22 font-size=%2256%22 font-family=%22Arial Black%22 fill=%22%23000%22>M</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FC5816;
    --black:  #000000;
    --cream:  #EFEED6;
    --cream-dark: #E2E0C2;
    --ink:    #1a1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--cream); color: var(--black); }
  body {
    font-family: 'Inter', sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding: 20px 16px 80px;
  }
  .container { max-width: 1080px; margin: 0 auto; }
  a { color: var(--black); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Archivo Black', sans-serif; letter-spacing: 0.02em; text-transform: uppercase; }

  /* PROTOCOL BAR */
  .protocol-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    padding: 10px 14px;
    margin-bottom: 22px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    flex-wrap: wrap;
    gap: 10px 22px;
  }
  .protocol-bar .right { display: flex; gap: 22px; flex-wrap: wrap; }
  .protocol-bar .dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--orange); border-radius: 50%;
    margin-right: 8px; vertical-align: middle;
  }

  /* HERO */
  .hero {
    background: var(--black);
    color: var(--cream);
    padding: 36px 36px 32px;
    border: 3px solid var(--black);
    position: relative;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .hero::before {
    content: ""; position: absolute;
    top: 18px; right: 24px;
    width: 42px; height: 42px;
    background: var(--orange);
  }
  .hero-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--orange);
    border: 1px solid var(--orange);
    padding: 5px 12px;
    margin-bottom: 18px;
  }
  .hero h1 {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 0.96;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 14px;
  }
  .hero h1 .mark { color: var(--orange); }
  .hero p { font-size: 14px; line-height: 1.6; color: var(--cream); opacity: 0.9; max-width: 580px; }

  .countdown {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 22px;
    align-items: center;
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1px solid var(--orange);
  }
  .countdown-days {
    font-family: 'Archivo Black', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: var(--orange);
    letter-spacing: 0.02em;
  }
  .countdown-mid .label,
  .countdown-right .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .countdown-mid .value,
  .countdown-right .value {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .countdown-right { text-align: right; }
  .countdown-right .ects-num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 32px;
    color: var(--cream);
  }

  /* SECTION */
  .section {
    background: var(--cream);
    border: 2px solid var(--black);
    padding: 22px 24px 20px;
    margin-bottom: 18px;
  }
  .section-head {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 2px solid var(--black);
  }
  .section-num {
    flex-shrink: 0;
    width: 38px; height: 38px;
    background: var(--orange);
    color: var(--black);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
  }
  .section-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.65;
    margin-bottom: 2px;
  }
  .section h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  /* TODAY */
  .focus-list { display: grid; gap: 8px; }
  .focus-item {
    background: var(--orange);
    color: var(--black);
    border: 2px solid var(--black);
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .focus-item::before {
    content: "▸";
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }

  /* DECISIONS */
  .decisions { display: grid; gap: 6px; }
  .decision {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px;
    background: var(--cream-dark);
    border: 2px solid var(--black);
    font-size: 13px;
  }
  .decision-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 3px 8px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .decision-status.open     { background: var(--black); color: var(--orange); }
  .decision-status.resolved { background: var(--orange); color: var(--black); }
  .decision-status.blocked  { background: var(--black); color: var(--cream); }

  /* MODULE GRID */
  .module-grid { display: grid; gap: 14px; }
  @media (min-width: 720px) { .module-grid { grid-template-columns: 1fr 1fr; } }

  .module {
    background: var(--cream);
    border: 2px solid var(--black);
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: background 0.12s ease;
    overflow: hidden;
  }
  .module:hover { background: var(--cream-dark); }
  .module.expanded { background: var(--cream-dark); cursor: default; }

  .module-top {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .module-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 17px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .module-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.65;
    margin-bottom: 12px;
  }

  .level-pill {
    display: inline-block;
    background: var(--orange);
    color: var(--black);
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-left: 6px;
  }

  /* PROGRESS BAR — brutalist */
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .progress-bar-wrap {
    flex: 1; height: 14px;
    background: var(--cream);
    border: 2px solid var(--black);
    overflow: hidden;
  }
  .progress-bar { height: 100%; background: var(--orange); transition: width 0.4s ease; }
  .progress-bar.empty { background: transparent; }
  .progress-bar.done  { background: var(--black); }
  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--black);
    min-width: 50px;
    text-align: right;
    font-weight: 700;
  }

  /* NEXT ACTION */
  .next-action {
    background: var(--black);
    color: var(--cream);
    padding: 10px 14px;
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.4;
  }
  .next-action::before {
    content: "// NEXT";
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--orange);
    margin-bottom: 4px;
  }

  /* MODULE DETAIL */
  .module-detail {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 2px solid var(--black);
    display: none;
  }
  .module.expanded .module-detail { display: block; }

  .detail-block { margin-bottom: 16px; }
  .detail-block:last-child { margin-bottom: 0; }
  .detail-block h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--orange);
    background: var(--black);
    display: inline-block;
    padding: 3px 9px;
    margin-bottom: 8px;
  }

  .key-rules { list-style: none; padding: 0; display: grid; gap: 4px; font-size: 12.5px; line-height: 1.45; }
  .key-rules li {
    padding-left: 14px;
    position: relative;
  }
  .key-rules li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--orange);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }

  .deliverables { display: grid; gap: 6px; }
  .deliverable {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 10px;
    background: var(--cream);
    border: 1px solid var(--black);
    font-size: 13px;
  }
  .deliverable-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    padding: 3px 7px;
    letter-spacing: 0.16em;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .deliverable-status.todo       { background: var(--cream-dark); color: var(--black); border: 1px solid var(--black); }
  .deliverable-status.inprogress { background: var(--orange); color: var(--black); }
  .deliverable-status.done       { background: var(--black); color: var(--orange); }
  .deliverable-status.undecided  { background: var(--cream); color: var(--black); border: 1px dashed var(--black); }
  .deliverable-name { flex: 1; line-height: 1.35; }
  .deliverable-notes {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.75;
    margin-top: 3px;
  }

  .checklist { list-style: none; padding: 0; display: grid; gap: 3px; }
  .checklist li {
    display: flex; gap: 8px; align-items: center;
    font-size: 12.5px;
    padding: 3px 0;
    color: var(--ink);
  }
  .check {
    width: 14px; height: 14px;
    border: 2px solid var(--black);
    background: var(--cream);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
  .checklist li.done { text-decoration: line-through; opacity: 0.55; }
  .checklist li.done .check { background: var(--orange); color: var(--black); }
  .checklist li.unknown { font-style: italic; opacity: 0.7; }
  .checklist li.unknown .check { background: var(--cream); color: var(--black); border-style: dashed; }

  .module-notes {
    background: var(--cream-dark);
    border-left: 4px solid var(--orange);
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.5;
  }

  /* FOOTER */
  .footer {
    margin-top: 36px;
    padding: 22px 0 0;
    border-top: 2px solid var(--black);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--black);
  }
  .footer .mark { color: var(--orange); }
  .footer .legend {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .legend-pill { display: flex; align-items: center; gap: 6px; }
  .legend-pill::before { content: ""; width: 10px; height: 10px; }
  .legend-pill.todo::before       { background: var(--cream-dark); border: 1px solid var(--black); }
  .legend-pill.inprogress::before { background: var(--orange); }
  .legend-pill.done::before       { background: var(--black); }
  .legend-pill.undecided::before  { background: var(--cream); border: 1px dashed var(--black); }

  @media (max-width: 600px) {
    .hero { padding: 26px 22px 24px; }
    .hero h1 { font-size: 30px; }
    .countdown { grid-template-columns: 1fr; gap: 14px; text-align: left; }
    .countdown-right { text-align: left; }
    .countdown-days { font-size: 48px; }
    .section { padding: 18px 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- PROTOCOL BAR -->
  <div class="protocol-bar">
    <div><span class="dot"></span>MANGO-LAB.DE / MODULES</div>
    <div class="right">
      <span>SEMESTER_SS26</span>
      <span id="header-date"></span>
      <span>STATUS_ACTIVE</span>
    </div>
  </div>

  <div id="app"></div>

  <div class="footer">
    <div class="legend">
      <span class="legend-pill todo">Todo</span>
      <span class="legend-pill inprogress">In progress</span>
      <span class="legend-pill done">Done</span>
      <span class="legend-pill undecided">Undecided</span>
    </div>
    <div>MANGO <span class="mark">LAB</span> · MODULES_DASHBOARD · NO NAVY · NO GRADIENTS · NO COMPROMISE</div>
    <div style="margin-top: 10px; opacity: 0.5;">Edit <span class="mono">data.js</span> · git push · GitHub Pages auto-deploys</div>
  </div>

</div>

<script src="data.js"></script>
<script>
  function daysUntil(targetDateStr) {
    const target = new Date(targetDateStr + "T23:59:59");
    const now = new Date();
    return Math.ceil((target.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
  }
  function formatDate(s) {
    const d = new Date(s + "T00:00:00");
    return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  }
  function moduleProgress(m) {
    const items = m.checklist || [];
    if (!items.length) return { pct: 0, done: 0, total: 0, knownTotal: 0 };
    const done = items.filter(i => i.done === true).length;
    const known = items.filter(i => i.done !== null).length;
    if (!known) return { pct: 0, done: 0, total: items.length, knownTotal: 0 };
    return { pct: Math.round((done / items.length) * 100), done, total: items.length, knownTotal: known };
  }
  function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function render() {
    const d = window.DASHBOARD_DATA;
    const days = daysUntil(d.deadline);
    const totalEcts = d.modules.reduce((s, m) => s + (m.ects || 0), 0);

    // header date
    document.getElementById("header-date").textContent =
      "T-" + days + "_DAYS";

    document.getElementById("app").innerHTML = `
      <div class="hero">
        <div class="hero-tag">PROJECT_MANGO_LAB · STUDENT_${d.student.toUpperCase().replace(/\s+/g, "_")}</div>
        <h1>MODULES<br>DASHBOARD</h1>
        <p>SS26 hand-in tracker. Eight modules, one project, one deadline. The countdown below is the only number that matters.</p>
        <div class="countdown">
          <div class="countdown-days">${days}</div>
          <div class="countdown-mid">
            <div class="label">Days to hand-in</div>
            <div class="value">${formatDate(d.deadline)}</div>
          </div>
          <div class="countdown-right">
            <div class="label">Total ECTS</div>
            <div class="ects-num">${totalEcts}</div>
          </div>
        </div>
      </div>

      ${renderTodayFocus(d.todayFocus)}
      ${renderDecisions(d.decisions)}
      ${renderModules(d.modules)}
    `;

    document.querySelectorAll(".module").forEach(el => {
      el.addEventListener("click", e => {
        if (e.target.closest("a")) return;
        el.classList.toggle("expanded");
      });
    });
  }

  function renderTodayFocus(items) {
    if (!items || !items.length) return "";
    return `
      <div class="section">
        <div class="section-head">
          <div class="section-num">01</div>
          <div>
            <div class="section-meta">SECTION_01 / FOCUS</div>
            <h2>Today's Focus</h2>
          </div>
        </div>
        <div class="focus-list">
          ${items.map(t => `<div class="focus-item">${escapeHtml(t)}</div>`).join("")}
        </div>
      </div>`;
  }

  function renderDecisions(items) {
    if (!items || !items.length) return "";
    return `
      <div class="section">
        <div class="section-head">
          <div class="section-num">02</div>
          <div>
            <div class="section-meta">SECTION_02 / DECISIONS</div>
            <h2>Open Decisions</h2>
          </div>
        </div>
        <div class="decisions">
          ${items.map(d => `
            <div class="decision">
              <span class="decision-status ${d.status}">${d.status}</span>
              <span>${escapeHtml(d.label)}</span>
            </div>`).join("")}
        </div>
      </div>`;
  }

  function renderModules(mods) {
    return `
      <div class="section">
        <div class="section-head">
          <div class="section-num">03</div>
          <div>
            <div class="section-meta">SECTION_03 / MODULES</div>
            <h2>The 8 Modules</h2>
          </div>
        </div>
        <div class="module-grid">
          ${mods.map(renderModule).join("")}
        </div>
      </div>`;
  }

  function renderModule(m) {
    const p = moduleProgress(m);
    const barClass = p.pct >= 100 ? "done" : (p.pct === 0 ? "empty" : "");
    const progLabel = p.knownTotal === 0
      ? `— / —`
      : `${p.done}/${p.total} · ${p.pct}%`;

    return `
      <div class="module" data-id="${m.id}">
        <div class="module-top">
          <span>${escapeHtml(m.code)}</span>
          <span>${m.ects} CP</span>
        </div>
        <div class="module-title">${escapeHtml(m.title)} <span class="level-pill">L${m.targetLevel}</span></div>
        <div class="module-meta">${escapeHtml(m.organizer)} · ${escapeHtml(m.type)}</div>

        <div class="progress-row">
          <div class="progress-bar-wrap"><div class="progress-bar ${barClass}" style="width:${p.pct}%"></div></div>
          <div class="progress-pct">${progLabel}</div>
        </div>

        ${m.nextAction ? `<div class="next-action">${escapeHtml(m.nextAction)}</div>` : ""}

        <div class="module-detail">
          ${m.keyRules && m.keyRules.length ? `
            <div class="detail-block">
              <h4>Key Rules</h4>
              <ul class="key-rules">
                ${m.keyRules.map(r => `<li>${escapeHtml(r)}</li>`).join("")}
              </ul>
            </div>` : ""}

          ${m.deliverables && m.deliverables.length ? `
            <div class="detail-block">
              <h4>Deliverables</h4>
              <div class="deliverables">
                ${m.deliverables.map(dv => `
                  <div class="deliverable">
                    <span class="deliverable-status ${dv.status}">${dv.status}</span>
                    <div class="deliverable-name">
                      ${escapeHtml(dv.name)}
                      ${dv.notes ? `<div class="deliverable-notes">${escapeHtml(dv.notes)}</div>` : ""}
                    </div>
                  </div>`).join("")}
              </div>
            </div>` : ""}

          ${m.checklist && m.checklist.length ? `
            <div class="detail-block">
              <h4>Checklist · ${p.done}/${p.total}</h4>
              <ul class="checklist">
                ${m.checklist.map(c => {
                  if (c.done === null) return `<li class="unknown"><span class="check">?</span>${escapeHtml(c.label)}</li>`;
                  if (c.done === true) return `<li class="done"><span class="check">✓</span>${escapeHtml(c.label)}</li>`;
                  return `<li><span class="check"></span>${escapeHtml(c.label)}</li>`;
                }).join("")}
              </ul>
            </div>` : ""}

          ${m.notes ? `
            <div class="detail-block">
              <h4>Notes</h4>
              <div class="module-notes">${escapeHtml(m.notes)}</div>
            </div>` : ""}
        </div>
      </div>`;
  }

  document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
